name: Lighthouse Report

on:
  push:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # npm cache
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache

      # LHCI cache
      - name: Cache LHCI
        uses: actions/cache@v6
        with:
          path: .lighthouseci
          key: ${{ runner.os }}-lhci-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-lhci-

      - name: Install LHCI
        run: npm i -D @lhci/cli

      - name: Run Lighthouse
        run: npx lhci autorun --collect.staticDistDir=.


      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/*
          include-hidden-files: true
