name: Lighthouse CI Auto Report

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node (Latest LTS)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # ここで lockfile を自動生成する（ローカル不要）
      - name: Generate lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json が無いので自動生成します"
            npm init -y
            npm i -D @lhci/cli
          fi

      - name: Install dependencies (cached)
        run: npm ci

      - name: Run Lighthouse (fast)
        run: |
          npx lhci autorun \
            --collect.staticDistDir=. \
            --collect.numberOfRuns=1 \
            --collect.settings.chromeFlags="--headless --no-sandbox --disable-dev-shm-usage"

      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/*
          include-hidden-files: true
