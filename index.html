<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromeOS Web Dummy</title>
    <meta name="description" content="A fork of ChromeOS using web technologies.">
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS inlined for faster FCP -->
    <style>
        *{box-sizing:border-box}:root{--md-sys-color-primary:#1f6feb;--md-sys-color-on-surface:#202124;--md-sys-color-surface:#fff;--md-sys-color-surface-dim:#eee;--md-elevation-level:1}body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:40px;font-family:'Roboto',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}.window{width:480px;height:600px;position:absolute;top:40px;left:50%;transform:translateX(-50%);transition:box-shadow .3s ease;z-index:100}.window.dragging,.window.resizing{transition:none}.window.window-focused{--md-elevation-level:2}.window.maximizing{transition:all .2s ease}.window.maximized .resize-handle{display:none}.window.maximized{width:100%;height:100%;left:0;top:0;border-radius:0}.window.maximized .window-content{border-radius:0}.window.maximized .title-bar{cursor:default}.window.minimizing{transition:all .2s ease}.window-content{display:flex;flex-direction:column;width:100%;height:100%;background:var(--md-sys-color-surface);border-radius:10px;overflow:hidden;position:relative;z-index:1;transition:opacity .2s ease,transform .2s ease}.window-content.closing{opacity:0;transform:scale(.95)}.window-content.minimizing{opacity:0;transform:scale(.8) translateY(20px)}.title-bar{display:flex;align-items:center;justify-content:space-between;height:auto;padding:0 0 0 16px;background:var(--md-sys-color-surface-dim);border-bottom:1px solid #e0e0e0;cursor:move;user-select:none;-webkit-user-select:none;position:relative;z-index:1}.title-bar-left{display:flex;align-items:center;flex:1}.title-text{font-size:auto;font-weight:500;color:var(--md-sys-color-on-surface);letter-spacing:.25px}.title-bar-right{display:flex;align-items:center}md-icon-button{--md-icon-button-icon-size:20px}iframe{flex:1;border:none;background:#fff}.resize-handle{position:absolute;z-index:10}.handle-t{top:-4px;left:4px;right:4px;height:8px;cursor:ns-resize}.handle-b{bottom:-4px;left:4px;right:4px;height:8px;cursor:ns-resize}.handle-l{left:-4px;top:4px;bottom:4px;width:8px;cursor:ew-resize}.handle-r{right:-4px;top:4px;bottom:4px;width:8px;cursor:ew-resize}.handle-tl{top:-4px;left:-4px;width:8px;height:8px;cursor:nwse-resize}.handle-tr{top:-4px;right:-4px;width:8px;height:8px;cursor:nesw-resize}.handle-bl{bottom:-4px;left:-4px;width:8px;height:8px;cursor:nesw-resize}.handle-br{bottom:-4px;right:-4px;width:8px;height:8px;cursor:nwse-resize}
    </style>
    
    <!-- Non-critical CSS loaded asynchronously -->
    <link rel="preload" href="css/styles.css" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="css/shelf.css" as="style" onload="this.rel='stylesheet'">
    
    <!-- Google Fonts with preload -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=optional" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- JavaScript: main.js が import グラフの起点。
         type="module" はデフォルトで defer 相当なので defer 属性は省略。 -->
    <script src="js/main.js" type="module"></script>
</head>
<body>
    <main>
        <div class="window" data-app-id="calculator">
            <div class="window-content">
                <div class="title-bar">
                    <div class="title-bar-left">
                        <div class="title-text">Calculator</div>
                    </div>
                    <div class="title-bar-right">
                        <md-icon-button title="Minimize" aria-label="Minimize" data-minimize>
                            <md-icon></md-icon>
                        </md-icon-button>
                        <md-icon-button title="Maximize" aria-label="Maximize" data-maximize>
                            <md-icon></md-icon>
                        </md-icon-button>
                        <md-icon-button title="Close" aria-label="Close" data-close>
                            <md-icon></md-icon>
                        </md-icon-button>
                    </div>
                </div>
                <iframe src="https://gcalc.pages.dev/" title="Calculator"></iframe>
            </div>
            <!-- Resize Handles -->
            <div class="resize-handle handle-t"></div>
            <div class="resize-handle handle-b"></div>
            <div class="resize-handle handle-l"></div>
            <div class="resize-handle handle-r"></div>
            <div class="resize-handle handle-tl"></div>
            <div class="resize-handle handle-tr"></div>
            <div class="resize-handle handle-bl"></div>
            <div class="resize-handle handle-br"></div>
        </div>
    </main>

    <!-- ChromeOS Shelf -->
    <footer class="shelf-container">
        <div class="shelf-left">
            <md-icon-button title="Launcher" aria-label="Launcher" data-launcher>
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
        </div>

        <div class="shelf-center">
            <md-icon-button class="shelf-app-btn" data-app-id="browser" title="Browser">
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
            <md-icon-button class="shelf-app-btn" data-app-id="mail" title="Mail">
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
            <md-icon-button class="shelf-app-btn" data-app-id="calendar" title="Calendar">
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
            <md-icon-button class="shelf-app-btn active-app" data-app-id="calculator" title="Calculator">
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
            <md-icon-button class="shelf-app-btn" data-app-id="chat" title="Chat">
                <md-icon class="shelf-icon"></md-icon>
            </md-icon-button>
        </div>

        <div class="shelf-right">
            <div class="status-pill">
                <div class="status-icons">
                    <md-icon class="shelf-icon small"></md-icon>
                    <md-icon class="shelf-icon small"></md-icon>
                </div>
                <span class="status-text" id="shelf-date">--</span>
                <span class="status-text" id="shelf-time">--:--</span>
            </div>
        </div>
    </footer>
</body>
</html>
