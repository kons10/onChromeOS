<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromeOS Web Dummy</title>
    <meta name="description" content="A fork of ChromeOS using web technologies.">
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS inlined for faster FCP -->
    <style>
        *{box-sizing:border-box}:root{--md-sys-color-primary:#1f6feb;--md-sys-color-on-surface:#202124;--md-sys-color-surface:#fff;--md-sys-color-surface-dim:#eee;--md-elevation-level:1}body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:40px;font-family:'Roboto',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}.window{width:480px;height:600px;background:var(--md-sys-color-surface);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;position:absolute;top:40px;left:50%;transform:translateX(-50%);transition:box-shadow .3s ease}.window.dragging{transition:none}.window md-elevation{position:absolute;border-radius:inherit}.window:hover{--md-elevation-level:2}.title-bar{display:flex;align-items:center;justify-content:space-between;height:auto;padding:0 0 0 16px;background:var(--md-sys-color-surface-dim);border-bottom:1px solid #e0e0e0;cursor:move;user-select:none;-webkit-user-select:none;position:relative;z-index:1}.title-bar-left{display:flex;align-items:center;flex:1}.title-text{font-size:auto;font-weight:500;color:var(--md-sys-color-on-surface);letter-spacing:.25px}.title-bar-right{display:flex;align-items:center}md-icon-button{--md-icon-button-icon-size:20px}iframe{flex:1;border:none;background:#fff}
    </style>
    
    <!-- Non-critical CSS loaded asynchronously -->
    <link rel="preload" href="css/styles.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/styles.css"></noscript>
    
    <!-- Google Fonts with preload -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- JavaScript deferred -->
    <script src="js/mwc.js" type="module" defer></script>
    <script src="js/window.js" type="module" defer></script>
</head>
<body>
    <main>
        <div class="window">
            <md-elevation></md-elevation>
            <div class="title-bar">
                <div class="title-bar-left">
                    <div class="title-text">Calculator</div>
                </div>
                <div class="title-bar-right">
                    <md-icon-button title="最小化" aria-label="最小化">
                        <md-icon></md-icon>
                    </md-icon-button>
                    <md-icon-button title="最大化" aria-label="最大化">
                        <md-icon></md-icon>
                    </md-icon-button>
                    <md-icon-button title="閉じる" aria-label="閉じる" data-close>
                        <md-icon></md-icon>
                    </md-icon-button>
                </div>
            </div>
            <iframe src="https://gcalc.pages.dev/" title="Calculator"></iframe>
        </div>
    </main>
</body>
</html>
